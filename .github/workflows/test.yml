name: test
run-name: tests by @${{ github.actor }}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run unit tests
        run: make test-unit

  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run shellcheck
        run: shellcheck --severity=error src/crabcode

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [unit, lint]
    # The shared action waits for all PR checks on this commit; on push to main
    # it can also pick up unrelated branch checks (for example Dependabot).
    if: ${{ always() && github.event_name == 'pull_request' }}
    timeout-minutes: 5
    permissions:
      checks: read
      statuses: read

    steps:
      - name: Wait for all PR checks to succeed
        uses: promptfoo/.github/.github/actions/ci-success@06453faf6e513174f5ee0b340bac7cdfa41bf437 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          timeout-seconds: 300
